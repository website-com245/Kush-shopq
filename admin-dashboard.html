<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUSH SHOP — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .page-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 6px; }
  .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .admin-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  @media (max-width: 860px) { .admin-stats { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 480px) { .admin-stats { grid-template-columns: 1fr; } }
  .admin-stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; position: relative; overflow: hidden; }
  .admin-stat-card::before { content: ''; position: absolute; top: -30px; right: -30px; width: 100px; height: 100px; border-radius: 50%; }
  .asc-purple::before { background: radial-gradient(circle, rgba(124,92,252,0.2), transparent 70%); }
  .asc-green::before { background: radial-gradient(circle, rgba(34,211,165,0.2), transparent 70%); }
  .asc-orange::before { background: radial-gradient(circle, rgba(251,191,36,0.2), transparent 70%); }
  .asc-red::before { background: radial-gradient(circle, rgba(244,63,94,0.2), transparent 70%); }
  .asc-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
  .asc-purple .asc-icon { background: rgba(124,92,252,0.15); color: var(--accent); }
  .asc-green .asc-icon { background: rgba(34,211,165,0.15); color: var(--success); }
  .asc-orange .asc-icon { background: rgba(251,191,36,0.15); color: var(--warning); }
  .asc-red .asc-icon { background: rgba(244,63,94,0.15); color: var(--error); }
  .asc-val { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; line-height: 1; }
  .asc-label { font-size: 12px; color: var(--muted); margin-top: 6px; font-weight: 500; }
  .tab-nav { display: flex; gap: 4px; background: var(--surface2); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
  .tab-btn { flex: 1; padding: 10px 16px; border: none; border-radius: 10px; background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .tab-btn.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .admin-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; margin-bottom: 24px; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border); }
  .panel-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .panel-title svg { color: var(--accent); }
  .panel-body { padding: 12px; max-height: 400px; overflow-y: auto; }
  .request-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px; transition: all 0.2s; }
  .request-item:hover { background: var(--surface2); }
  .req-avatar { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .req-info { flex: 1; min-width: 0; }
  .req-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .req-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .req-pts { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
  .req-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .req-btn { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
  .req-btn.approve { background: rgba(34,211,165,0.15); color: var(--success); }
  .req-btn.approve:hover { background: rgba(34,211,165,0.3); }
  .req-btn.reject { background: rgba(244,63,94,0.15); color: var(--error); }
  .req-btn.reject:hover { background: rgba(244,63,94,0.3); }
  .proof-thumb { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; cursor: pointer; border: 2px solid var(--border); transition: all 0.2s; flex-shrink: 0; }
  .proof-thumb:hover { border-color: var(--accent); transform: scale(1.05); box-shadow: 0 4px 12px rgba(124,92,252,0.3); }
  .order-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px; transition: all 0.2s; }
  .order-item:hover { background: var(--surface2); }
  .order-thumb-sm { width: 48px; height: 48px; border-radius: 10px; background: var(--surface2); overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); }
  .order-thumb-sm img { width: 100%; height: 100%; object-fit: cover; }
  .order-info-sm { flex: 1; min-width: 0; }
  .order-name-sm { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .order-user-sm { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .status-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; color: var(--text); font-size: 12px; cursor: pointer; outline: none; }
  .status-select:focus { border-color: var(--accent); }
  .empty-panel { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
  .refresh-btn { padding: 6px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .users-table { width: 100%; border-collapse: collapse; }
  .users-table th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); border-bottom: 1px solid var(--border); }
  .users-table td { padding: 12px; font-size: 13px; border-bottom: 1px solid var(--border); }
  .users-table tr:last-child td { border-bottom: none; }
  .users-table tr:hover td { background: var(--surface2); }
  .user-row-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 12px; }
  .role-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; color: var(--text); font-size: 11px; cursor: pointer; outline: none; }
  .view-proof-btn { padding: 6px 10px; background: rgba(124,92,252,0.12); color: var(--accent2); border: 1px solid rgba(124,92,252,0.3); border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 4px; }
  .view-proof-btn:hover { background: rgba(124,92,252,0.2); border-color: var(--accent); }

  /* Full Screen Proof Modal */
  .proof-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 600; display: none; align-items: center; justify-content: center; flex-direction: column; }
  .proof-modal-overlay.open { display: flex; }
  .proof-modal-header { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 800px; padding: 0 20px 16px; }
  .proof-modal-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: #fff; }
  .proof-modal-close { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .proof-modal-close:hover { background: rgba(255,255,255,0.2); }
  .proof-modal-img-wrap { max-width: 90vw; max-height: 80vh; display: flex; align-items: center; justify-content: center; }
  .proof-modal-img { max-width: 100%; max-height: 80vh; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); object-fit: contain; }
  .proof-modal-footer { display: flex; gap: 10px; padding: 16px 20px 0; }
  .proof-modal-btn { padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
  .proof-modal-btn.approve { background: var(--success); color: #fff; }
  .proof-modal-btn.approve:hover { opacity: 0.9; }
  .proof-modal-btn.reject { background: var(--error); color: #fff; }
  .proof-modal-btn.reject:hover { opacity: 0.9; }
  .proof-modal-info { color: rgba(255,255,255,0.7); font-size: 13px; padding-top: 12px; }
</style>
</head>
<body>
<div class="main-content">
  <div class="page-container">
    <h1 class="page-title">Admin Dashboard</h1>
    <p class="page-sub">Manage your store, orders, and users</p>

    <div class="admin-stats">
      <div class="admin-stat-card asc-purple">
        <div class="asc-icon"><svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2"/></svg></div>
        <div class="asc-val" id="statGames">0</div>
        <div class="asc-label">Total Games</div>
      </div>
      <div class="admin-stat-card asc-green">
        <div class="asc-icon"><svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg></div>
        <div class="asc-val" id="statUsers">0</div>
        <div class="asc-label">Total Users</div>
      </div>
      <div class="admin-stat-card asc-orange">
        <div class="asc-icon"><svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg></div>
        <div class="asc-val" id="statPending">0</div>
        <div class="asc-label">Pending Requests</div>
      </div>
      <div class="admin-stat-card asc-red">
        <div class="asc-icon"><svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg></div>
        <div class="asc-val" id="statOrders">0</div>
        <div class="asc-label">Total Orders</div>
      </div>
    </div>

        <button class="tab-btn active" onclick="setAdminTab('requests',this)" id="tabRequests">Point Requests</button>
      <button class="tab-btn" onclick="setAdminTab('orders',this)" id="tabOrders">Game Orders</button>
      <button class="tab-btn" onclick="setAdminTab('users',this)" id="tabUsers">Users</button>
    </div>

    <!-- Point Requests Panel -->
    <div class="admin-panel" id="panelRequests">
      <div class="panel-header">
        <div class="panel-title"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> Point Purchase Requests</div>
        <button class="refresh-btn" onclick="loadRequests()"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> Refresh</button>
      </div>
      <div class="panel-body" id="requestsList"><div class="empty-panel">Loading...</div></div>
    </div>

    <!-- Game Orders Panel -->
    <div class="admin-panel" id="panelOrders" style="display:none">
      <div class="panel-header">
        <div class="panel-title"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg> Game Orders</div>
        <button class="refresh-btn" onclick="loadOrders()"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> Refresh</button>
      </div>
      <div class="panel-body" id="ordersList"><div class="empty-panel">Loading...</div></div>
    </div>

    <!-- Users Panel -->
    <div class="admin-panel" id="panelUsers" style="display:none">
      <div class="panel-header">
        <div class="panel-title"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg> All Users</div>
        <button class="refresh-btn" onclick="loadUsers()"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> Refresh</button>
      </div>
      <div class="panel-body" style="padding:0">
        <table class="users-table">
          <thead><tr><th>User</th><th>Email</th><th>Points</th><th>Role</th><th>Joined</th><th>Actions</th></tr></thead>
          <tbody id="usersTableBody"><tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted)">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Full Screen Proof Modal -->
<div class="proof-modal-overlay" id="proofModal">
  <div class="proof-modal-header">
    <div class="proof-modal-title">📸 Proof of Payment</div>
    <button class="proof-modal-close" onclick="closeProofModal()">×</button>
  </div>
  <div class="proof-modal-img-wrap">
    <img id="proofModalImg" class="proof-modal-img" src="" alt="Proof">
  </div>
  <div class="proof-modal-footer">
    <button class="proof-modal-btn approve" id="proofApproveBtn" onclick="approveFromProof()">✅ Approve Request</button>
    <button class="proof-modal-btn reject" id="proofRejectBtn" onclick="rejectFromProof()">❌ Reject Request</button>
  </div>
  <div class="proof-modal-info" id="proofModalInfo"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, onValue, get, update, remove, set, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
  apiKey: "AIzaSyAa4s7Tn4RNk8TcBE60H54Iy9sKX4bp8L8",
  authDomain: "ok123-716e3.firebaseapp.com",
  projectId: "ok123-716e3",
  storageBucket: "ok123-716e3.firebasestorage.app",
  messagingSenderId: "395598144464",
  appId: "1:395598144464:web:3c0439d9ac9c9688654fd5",
  measurementId: "G-5LCN0JXS9P"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const theme = localStorage.getItem('theme') || 'dark';
  if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');

  let currentUser = null;
  let currentProofReqId = null;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    currentUser = user;

    const snap = await get(ref(db, 'users/' + user.uid));
    const userData = snap.val() || {};
    if (userData.role !== 'admin') { window.location.href = 'home.html'; return; }

    renderTopbar('Admin Dashboard', userData, true);
    renderSidebar('admin-dashboard', userData, true);
    loadStats();
    loadRequests();
    loadOrders();
    loadUsers();

    onValue(ref(db, 'games'), (s) => { document.getElementById('statGames').textContent = s.exists() ? Object.keys(s.val()).length : 0; });
    onValue(ref(db, 'users'), (s) => { document.getElementById('statUsers').textContent = s.exists() ? Object.keys(s.val()).length : 0; });
    onValue(ref(db, 'orders'), (s) => { document.getElementById('statOrders').textContent = s.exists() ? Object.keys(s.val()).length : 0; });
  });

  async function loadStats() {
    const [gamesSnap, usersSnap, ordersSnap, reqSnap] = await Promise.all([
      get(ref(db, 'games')), get(ref(db, 'users')), get(ref(db, 'orders')), get(ref(db, 'pointRequests'))
    ]);
    document.getElementById('statGames').textContent = gamesSnap.exists() ? Object.keys(gamesSnap.val()).length : 0;
    document.getElementById('statUsers').textContent = usersSnap.exists() ? Object.keys(usersSnap.val()).length : 0;
    document.getElementById('statOrders').textContent = ordersSnap.exists() ? Object.keys(ordersSnap.val()).length : 0;
    const reqs = reqSnap.val() || {};
    document.getElementById('statPending').textContent = Object.values(reqs).filter(r => r.status === 'pending').length;
  }

  async function loadRequests() {
    const snap = await get(ref(db, 'pointRequests'));
    const container = document.getElementById('requestsList');
    const reqs = snap.val();
    if (!reqs) { container.innerHTML = '<div class="empty-panel">No requests found</div>'; return; }

    const entries = Object.entries(reqs).map(([id, r]) => ({ id, ...r })).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    container.innerHTML = entries.map(req => {
      const initial = (req.userName || 'U')[0].toUpperCase();
      const date = req.createdAt ? new Date(req.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '—';
      const isPending = req.status === 'pending';
      return `
        <div class="request-item">
          <div class="req-avatar">${initial}</div>
          <div class="req-info">
            <div class="req-name">${req.userName || 'User'}</div>
            <div class="req-meta">${req.userEmail || ''} · ${date}</div>
            <div class="req-meta">${req.points} pts · ${req.amount ? '₱' + req.amount : ''}</div>
          </div>
          <div class="req-pts">+${req.points || 0}</div>
          <div class="req-actions">
            ${req.proofImage ? `<button class="view-proof-btn" onclick="openProofModal('${req.id}')"><svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg> View</button>` : ''}
            ${isPending ? `<button class="req-btn approve" onclick="approveRequest('${req.id}')">✓</button><button class="req-btn reject" onclick="rejectRequest('${req.id}')">✗</button>` : `<span style="font-size:12px;color:var(--muted)">${req.status}</span>`}
          </div>
        </div>
      `;
    }).join('');
    document.getElementById('statPending').textContent = entries.filter(r => r.status === 'pending').length;
  }

  async function loadOrders() {
    const snap = await get(ref(db, 'orders'));
    const container = document.getElementById('ordersList');
    const orders = snap.val();
    if (!orders) { container.innerHTML = '<div class="empty-panel">No orders found</div>'; return; }
    const entries = Object.entries(orders).map(([id, o]) => ({ id, ...o })).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    container.innerHTML = entries.map(order => {
      const thumb = order.gameImage ? `<img src="${order.gameImage}" style="width:100%;height:100%;object-fit:cover">` : `<svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2"/></svg>`;
      const date = order.createdAt ? new Date(order.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '—';
      return `
        <div class="order-item">
          <div class="order-thumb-sm">${thumb}</div>
          <div class="order-info-sm">
            <div class="order-name-sm">${order.gameName || 'Game'}</div>
            <div class="order-user-sm">${order.pointsSpent || 0} pts · ${date}</div>
          </div>
          <select class="status-select" onchange="updateOrderStatus('${order.id}', this.value)">
            <option value="pending" ${order.status==='pending'?'selected':''}>Pending</option>
            <option value="completed" ${order.status==='completed'?'selected':''}>Completed</option>
            <option value="rejected" ${order.status==='rejected'?'selected':''}>Rejected</option>
          </select>
        </div>
      `;
    }).join('');
  }

  async function loadUsers() {
    const snap = await get(ref(db, 'users'));
    const tbody = document.getElementById('usersTableBody');
    const users = snap.val();
    if (!users) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted)">No users found</td></tr>'; return; }
    const entries = Object.entries(users).map(([id, u]) => ({ id, ...u })).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    tbody.innerHTML = entries.map(user => {
      const initial = (user.displayName || user.email || 'U')[0].toUpperCase();
      const date = user.createdAt ? new Date(user.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
      return `
        <tr>
          <td><div style="display:flex;align-items:center;gap:10px"><div class="user-row-avatar">${initial}</div><div>${user.displayName || 'User'}</div></div></td>
          <td style="color:var(--muted);font-size:12px">${user.email || '—'}</td>
          <td><span style="font-weight:700;color:var(--accent2)">${user.points || 0}</span></td>
          <td><select class="role-select" onchange="updateUserRole('${user.id}', this.value)"><option value="buyer" ${user.role==='buyer'?'selected':''}>Buyer</option><option value="admin" ${user.role==='admin'?'selected':''}>Admin</option></select></td>
          <td style="color:var(--muted);font-size:12px">${date}</td>
          <td><button class="req-btn reject" onclick="deleteUser('${user.id}')" style="padding:4px 8px;font-size:11px">Delete</button></td>
        </tr>
      `;
    }).join('');
  }

  // Full Screen Proof Modal
  window.openProofModal = async (reqId) => {
    currentProofReqId = reqId;
    const snap = await get(ref(db, 'pointRequests/' + reqId));
    const req = snap.val();
    if (!req || !req.proofImage) return;

    document.getElementById('proofModalImg').src = req.proofImage;
    document.getElementById('proofModalInfo').textContent = `${req.userName || 'User'} · +${req.points} pts · ${req.amount ? '₱' + req.amount : ''}`;
    document.getElementById('proofApproveBtn').style.display = req.status === 'pending' ? 'block' : 'none';
    document.getElementById('proofRejectBtn').style.display = req.status === 'pending' ? 'block' : 'none';
    document.getElementById('proofModal').classList.add('open');
  };

  window.closeProofModal = () => { document.getElementById('proofModal').classList.remove('open'); currentProofReqId = null; };

  window.approveFromProof = async () => {
    if (!currentProofReqId) return;
    await window.approveRequest(currentProofReqId);
    closeProofModal();
  };

  window.rejectFromProof = async () => {
    if (!currentProofReqId) return;
    await window.rejectRequest(currentProofReqId);
    closeProofModal();
  };

  // Close modal on Escape key
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeProofModal(); });

  window.setAdminTab = (tab, el) => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('panelRequests').style.display = tab === 'requests' ? 'block' : 'none';
    document.getElementById('panelOrders').style.display = tab === 'orders' ? 'block' : 'none';
    document.getElementById('panelUsers').style.display = tab === 'users' ? 'block' : 'none';
  };

  window.approveRequest = async (reqId) => {
    try {
      const reqSnap = await get(ref(db, 'pointRequests/' + reqId));
      const req = reqSnap.val();
      if (!req) return;
      const userSnap = await get(ref(db, 'users/' + req.userId));
      const currentPts = userSnap.val()?.points || 0;
      await update(ref(db, 'users/' + req.userId), { points: currentPts + (req.points || 0) });
      await update(ref(db, 'pointRequests/' + reqId), { status: 'completed' });
      await push(ref(db, 'notifications/' + req.userId), { title: 'Points Added!', message: `${req.points} points have been credited to your account.`, timestamp: Date.now(), read: false });
      showToast('Approved', `Added ${req.points} points to ${req.userName}`, 'success');
      loadRequests();
      loadStats();
    } catch (e) { showToast('Error', e.message, 'error'); }
  };

  window.rejectRequest = async (reqId) => {
    if (!confirm('Reject this request?')) return;
    try {
      await update(ref(db, 'pointRequests/' + reqId), { status: 'rejected' });
      const reqSnap = await get(ref(db, 'pointRequests/' + reqId));
      const req = reqSnap.val();
      if (req) { await push(ref(db, 'notifications/' + req.userId), { title: 'Request Rejected', message: 'Your points purchase request has been rejected.', timestamp: Date.now(), read: false }); }
      showToast('Rejected', 'Request has been rejected', 'warning');
      loadRequests();
      loadStats();
    } catch (e) { showToast('Error', e.message, 'error'); }
  };

  window.updateOrderStatus = async (orderId, status) => {
    try {
      await update(ref(db, 'orders/' + orderId), { status });
      const orderSnap = await get(ref(db, 'orders/' + orderId));
      const order = orderSnap.val();
      if (order) {
        const msg = status === 'completed' ? `Your order for "${order.gameName}" has been approved. Check your Done Buy page!` : `Your order for "${order.gameName}" has been ${status}.`;
        await push(ref(db, 'notifications/' + order.userId), { title: `Order ${status.charAt(0).toUpperCase() + status.slice(1)}`, message: msg, timestamp: Date.now(), read: false });
      }
      showToast('Updated', `Order status changed to ${status}`, 'success');
      loadOrders();
    } catch (e) { showToast('Error', e.message, 'error'); }
  };

  window.updateUserRole = async (userId, role) => {
    try { await update(ref(db, 'users/' + userId), { role }); showToast('Role Updated', `User role changed to ${role}`, 'success'); }
    catch (e) { showToast('Error', e.message, 'error'); }
  };

  window.deleteUser = async (userId) => {
    if (!confirm('Delete this user? This cannot be undone.')) return;
    if (!confirm('FINAL WARNING: All data will be permanently deleted.')) return;
    try { await remove(ref(db, 'users/' + userId)); await remove(ref(db, 'notifications/' + userId)); showToast('User Deleted', 'User has been permanently deleted', 'success'); loadUsers(); loadStats(); }
    catch (e) { showToast('Error', e.message, 'error'); }
  };

  function showToast(title, msg, type) {
    const id = 'toast_' + Date.now();
    const el = document.createElement('div');
    el.className = `toast ${type}`; el.id = id;
    el.innerHTML = `<div><div class="toast-title">${title}</div><div class="toast-msg">${msg}</div></div><button class="toast-close" onclick="document.getElementById('${id}').remove()">×</button>`;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => { const t = document.getElementById(id); if(t) t.remove(); }, 5000);
  }
  window.showToast = showToast;

  function renderTopbar(title, userData, isAdmin) {
    const initial = (userData.displayName || userData.email || 'U')[0].toUpperCase();
    document.body.insertAdjacentHTML('afterbegin', `
      <div class="topbar"><button class="hamburger" onclick="toggleSidebar()"><svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button><span class="logo-inline">${title}</span><div class="topbar-right"><div class="avatar-btn" onclick="window.location.href='account.html'">${initial}</div></div></div>
      <div class="toast-container" id="toastContainer"></div>
    `);
  }

  function renderSidebar(currentPage, userData, isAdmin) {
    document.body.insertAdjacentHTML('afterbegin', `
           <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="sidebar-logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="sidebar-logo-text">KUSH SHOP</span></div>
        <div class="sidebar-user"><div class="sidebar-user-name">${userData.displayName||'User'}</div><div class="sidebar-user-email">${userData.email||''}</div><div class="sidebar-points"><svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${userData.points||0} pts</div></div>
        <nav class="sidebar-nav">
          <div class="nav-section">Main</div>
          <a href="home.html" class="nav-item ${currentPage==='home'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg> Home</a>
          <a href="shop.html" class="nav-item ${currentPage==='shop'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg> Products</a>
          <div class="nav-section">Admin</div>
          <a href="admin-dashboard.html" class="nav-item active"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Admin Dashboard <span class="admin-badge">Admin</span></a>
          <a href="upload.html" class="nav-item ${currentPage==='upload'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg> Upload Game</a>
          <div class="nav-section">Account</div>
          <a href="account.html" class="nav-item ${currentPage==='account'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg> Account</a>
          <a href="point.html" class="nav-item ${currentPage==='point'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> Your Points</a>
          <a href="buy-point.html" class="nav-item ${currentPage==='buy-point'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg> Buy Points</a>
          <a href="done-buy.html" class="nav-item ${currentPage==='done-buy'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> Done Buy</a>
          <div class="nav-section">Preferences</div>
          <a href="setting.html" class="nav-item ${currentPage==='setting'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg> Settings</a>
          <div class="theme-toggle" onclick="toggleTheme()"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg> Theme <div class="toggle-switch"></div></div>
        </nav>
        <div class="sidebar-footer"><button class="logout-btn" onclick="doLogout()"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg> Sign Out</button></div>
      </div>
      <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    `);
  }

  window.toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('show'); };
  window.closeSidebar = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); };
  window.toggleTheme = () => { const c = document.documentElement.getAttribute('data-theme'); const n = c==='light'?'dark':'light'; document.documentElement.setAttribute('data-theme',n); localStorage.setItem('theme',n); };
  window.doLogout = async () => { await signOut(auth); window.location.href = 'login.html'; };
</script>
</body>
</html>
