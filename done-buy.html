<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUSH STORE — Done Buy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .page-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 6px; }
  .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .orders-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }
  .order-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    transition: all 0.2s;
  }
  .order-card:hover {
    border-color: rgba(124,92,252,0.4);
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.25);
  }
  .order-thumb {
    width: 100%; height: 160px;
    background: linear-gradient(135deg, var(--surface2), var(--surface3));
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    overflow: hidden;
    position: relative;
  }
  .order-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .order-status-badge {
    position: absolute; top: 12px; right: 12px;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 6px;
  }
  .status-pending {
    background: rgba(251,191,36,0.2);
    border: 1px solid rgba(251,191,36,0.4);
    color: var(--warning);
  }
  .status-approved, .status-completed {
    background: rgba(34,211,165,0.2);
    border: 1px solid rgba(34,211,165,0.4);
    color: var(--success);
  }
  .status-rejected, .status-cancelled {
    background: rgba(244,63,94,0.2);
    border: 1px solid rgba(244,63,94,0.4);
    color: var(--error);
  }
  .order-body { padding: 18px; }
  .order-name {
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 700;
    margin-bottom: 6px;
  }
  .order-meta {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .order-meta-item {
    font-size: 12px; color: var(--muted);
    display: flex; align-items: center; gap: 4px;
  }
  .order-meta-item svg { width: 14px; height: 14px; }
  .order-key {
    background: var(--surface2);
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .order-key-label {
    font-size: 10px; font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .order-key-value {
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700;
    color: var(--accent2);
    word-break: break-all;
    line-height: 1.5;
  }
  .order-key-value.hidden { filter: blur(5px); user-select: none; }
  .reveal-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .reveal-overlay:hover { opacity: 0.8; }
  .reveal-text {
    color: #fff;
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .order-actions {
    display: flex; gap: 8px;
  }
  .order-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    border: none;
  }
  .order-btn.download {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .order-btn.download:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(124,92,252,0.4);
  }
  .order-btn.copy {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .order-btn.copy:hover { border-color: var(--accent); }
  .filter-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .filter-tab {
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-tab:hover { border-color: var(--accent); color: var(--text); }
  .filter-tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent;
    color: #fff;
  }
  .count-badge {
    background: rgba(255,255,255,0.2);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    margin-left: 6px;
  }
  .pending-msg {
    background: rgba(251,191,36,0.08);
    border: 1px solid rgba(251,191,36,0.2);
    border-radius: 14px;
    padding: 16px 20px;
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 24px;
    font-size: 14px;
    color: var(--warning);
  }
  .pending-msg svg { flex-shrink: 0; }
</style>
</head>
<body>
<div class="main-content">
  <div class="page-container">
    <h1 class="page-title">Done Buy</h1>
    <p class="page-sub">Download your purchased games and access game keys</p>

    <div class="pending-msg" id="pendingMsg" style="display:none">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <span>You have <strong id="pendingCount">0</strong> pending order(s) awaiting admin approval.</span>
    </div>

    <div class="filter-row">
      <button class="filter-tab active" onclick="setOrderFilter('all',this)">All<span class="count-badge" id="countAll">0</span></button>
      <button class="filter-tab" onclick="setOrderFilter('completed',this)">Completed<span class="count-badge" id="countCompleted">0</span></button>
      <button class="filter-tab" onclick="setOrderFilter('pending',this)">Pending<span class="count-badge" id="countPending">0</span></button>
      <button class="filter-tab" onclick="setOrderFilter('rejected',this)">Rejected<span class="count-badge" id="countRejected">0</span></button>
    </div>

    <div class="orders-grid" id="ordersGrid">
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon"><svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
        <h3>No orders yet</h3>
        <p>Purchase a game to see it here</p>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
  apiKey: "AIzaSyAa4s7Tn4RNk8TcBE60H54Iy9sKX4bp8L8",
  authDomain: "ok123-716e3.firebaseapp.com",
  projectId: "ok123-716e3",
  storageBucket: "ok123-716e3.firebasestorage.app",
  messagingSenderId: "395598144464",
  appId: "1:395598144464:web:3c0439d9ac9c9688654fd5",
  measurementId: "G-5LCN0JXS9P"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const theme = localStorage.getItem('theme') || 'dark';
  if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');

  let currentUser = null;
  let allOrders = [];

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    currentUser = user;

    const snap = await get(ref(db, 'users/' + user.uid));
    const userData = snap.val() || {};
    const isAdmin = userData.role === 'admin';

    renderTopbar('Done Buy', userData, isAdmin);
    renderSidebar('done-buy', userData, isAdmin);

    // Load orders realtime
    onValue(ref(db, 'orders'), (s) => {
      const orders = s.val() || {};
      allOrders = Object.entries(orders)
        .filter(([, o]) => o.userId === user.uid)
        .map(([id, o]) => ({ id, ...o }))
        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      updateCounts();
      renderOrders(allOrders);
    });
  });

  function updateCounts() {
    const all = allOrders.length;
    const completed = allOrders.filter(o => o.status === 'completed').length;
    const pending = allOrders.filter(o => o.status === 'pending').length;
    const rejected = allOrders.filter(o => o.status === 'rejected' || o.status === 'cancelled').length;

    document.getElementById('countAll').textContent = all;
    document.getElementById('countCompleted').textContent = completed;
    document.getElementById('countPending').textContent = pending;
    document.getElementById('countRejected').textContent = rejected;

    document.getElementById('pendingMsg').style.display = pending > 0 ? 'flex' : 'none';
    document.getElementById('pendingCount').textContent = pending;
  }

  function renderOrders(orders) {
  const grid = document.getElementById('ordersGrid');
  
  if (!orders.length) {
    grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
                <div class="empty-icon"><svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
                <h3>No orders found</h3>
                <p>Purchase a game to see it here</p>
            </div>`;
    return;
  }
  
  grid.innerHTML = orders.map(order => {
    const statusLabel = order.status || 'pending';
    const statusClass = 'status-' + statusLabel;
    const date = order.createdAt ? new Date(order.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
    
    const hasKey = (order.gameKey && order.gameKey.trim() !== '') ||
      (order.keys && order.keys[0] && order.keys[0].trim() !== '');
    
    const isCompleted = order.status === 'completed';
    const showKey = isCompleted && hasKey;
    const displayKey = order.gameKey || (order.keys && order.keys[0]) || '';
    
    // ✅ Check if key is a URL
    const isKeyUrl = displayKey.startsWith('http://') || displayKey.startsWith('https://');
    
    // ✅ Hosting link for download button
    const hostingLink = order.hostingLink || '';
    
    return `
            <div class="order-card">
                <div class="order-thumb">
                    ${order.gameImage
                        ? `<img src="${order.gameImage}" alt="${order.gameName}">`
                        : `<svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2"/></svg>`
                    }
                    <span class="order-status-badge ${statusClass}">${statusLabel}</span>
                </div>
                <div class="order-body">
                    <div class="order-name">${order.gameName || 'Game'}</div>
                    <div class="order-meta">
                        <span class="order-meta-item">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                            ${order.pointsSpent || 0} pts
                        </span>
                        <span class="order-meta-item">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            ${date}
                        </span>
                    </div>

                    ${showKey ? `
                        <div class="order-key" id="keyBox-${order.id}">
                            <div class="order-key-label">${isKeyUrl ? 'Download Link' : 'Game Key / Serial'}</div>
                            <div class="order-key-value" id="keyVal-${order.id}">
                                ${isKeyUrl 
                                    ? `<a href="${displayKey}" target="_blank" style="color:var(--accent2);text-decoration:underline;">${displayKey}</a>`
                                    : displayKey
                                }
                            </div>
                            <div class="reveal-overlay" onclick="revealKey('${order.id}')">
                                <span class="reveal-text"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg> Click to reveal</span>
                            </div>
                        </div>
                    ` : `
                        <div class="order-key" style="background:var(--surface2);border-style:dashed">
                            <div class="order-key-label" style="color:var(--muted)">
                                ${order.status === 'pending' ? '⏳ Key will be available after approval' : order.status === 'rejected' || order.status === 'cancelled' ? '❌ Order rejected' : '📦 Key processing...'}
                            </div>
                        </div>
                    `}

                    <div class="order-actions">
                        ${showKey ? `
                            <button class="order-btn download" onclick="copyKey('${order.id}')">
                                <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                                Copy Key
                            </button>
                        ` : ''}
                        
                        ${showKey && hostingLink ? `
                            <button class="order-btn download" onclick="downloadGame('${order.id}')" style="background: linear-gradient(135deg, #22d3a5, #16a085);">
                                <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                                Download
                            </button>
                        ` : ''}
                        
                        ${order.status === 'pending' ? `
                            <button class="order-btn copy" onclick="cancelOrder('${order.id}')" style="flex:1;color:var(--error);border-color:rgba(244,63,94,0.3)">
                                <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                                Cancel
                            </button>
                        ` : ''}
                    </div>
                </div>
            </div>
        `;
  }).join('');
}
  window.setOrderFilter = (filter, el) => {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    const filtered = filter === 'all' ? allOrders : allOrders.filter(o => o.status === filter);
    renderOrders(filtered);
  };

  window.downloadGame = (orderId) => {
  const order = allOrders.find(o => o.id === orderId);
  if (!order || !order.hostingLink) return;
  
  // ✅ Open download link in new tab
  window.open(order.hostingLink, '_blank');
  showToast('Download Started', 'Opening download link...', 'success');
};

window.revealKey = (orderId) => {
  const overlay = document.querySelector(`#keyBox-${orderId} .reveal-overlay`);
  if (overlay) overlay.style.display = 'none';
  showToast('Key Revealed', 'Game key is now visible', 'success');
};

window.copyKey = async (orderId) => {
  const order = allOrders.find(o => o.id === orderId);
  if (!order) return;
  const key = order.gameKey || (order.keys && order.keys[0]) || '';
  if (!key) return;
  try {
    await navigator.clipboard.writeText(key);
    showToast('Copied!', 'Game key copied to clipboard', 'success');
  } catch {
    showToast('Error', 'Failed to copy key', 'error');
  }
};

  window.cancelOrder = async (orderId) => {
    if (!confirm('Cancel this order? Your points will be refunded.')) return;
    const order = allOrders.find(o => o.id === orderId);
    if (!order) return;
    try {
      const { update, ref } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
      // Refund points
      const userSnap = await get(ref(db, 'users/' + currentUser.uid));
      const userPts = userSnap.val()?.points || 0;
      await update(ref(db, 'users/' + currentUser.uid), { points: userPts + (order.pointsSpent || 0) });
      // Cancel order
      await update(ref(db, 'orders/' + orderId), { status: 'cancelled' });
      showToast('Order Cancelled', 'Your points have been refunded', 'success');
    } catch (e) {
      showToast('Error', e.message, 'error');
    }
  };

    function showToast(title, msg, type) {
    const id = 'toast_' + Date.now();
    const el = document.createElement('div');
    el.className = `toast ${type}`; el.id = id;
    el.innerHTML = `<div><div class="toast-title">${title}</div><div class="toast-msg">${msg}</div></div><button class="toast-close" onclick="document.getElementById('${id}').remove()">×</button>`;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => { const t = document.getElementById(id); if(t) t.remove(); }, 5000);
  }
  window.showToast = showToast;

  function renderTopbar(title, userData, isAdmin) {
    const initial = (userData.displayName || userData.email || 'U')[0].toUpperCase();
    document.body.insertAdjacentHTML('afterbegin', `
      <div class="topbar">
        <button class="hamburger" onclick="toggleSidebar()"><svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <span class="logo-inline">${title}</span>
        <div class="topbar-right">
          <div class="avatar-btn" onclick="window.location.href='account.html'">${initial}</div>
        </div>
      </div>
      <div class="toast-container" id="toastContainer"></div>
    `);
  }

  function renderSidebar(currentPage, userData, isAdmin) {
    const adminItems = isAdmin ? `
      <div class="nav-section">Admin</div>
      <a href="admin-dashboard.html" class="nav-item ${currentPage==='admin-dashboard'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Admin Dashboard <span class="admin-badge">Admin</span></a>
      <a href="upload.html" class="nav-item ${currentPage==='upload'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg> Upload Game</a>
    ` : '';
    document.body.insertAdjacentHTML('afterbegin', `
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="sidebar-logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="sidebar-logo-text">KUSH SHOP</span></div>
        <div class="sidebar-user"><div class="sidebar-user-name">${userData.displayName||'User'}</div><div class="sidebar-user-email">${userData.email||''}</div><div class="sidebar-points"><svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${userData.points||0} pts</div></div>
        <nav class="sidebar-nav">
          <div class="nav-section">Main</div>
          <a href="home.html" class="nav-item ${currentPage==='home'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg> Home</a>
          <a href="shop.html" class="nav-item ${currentPage==='shop'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg> Products</a>
          <div class="nav-section">Account</div>
          <a href="account.html" class="nav-item ${currentPage==='account'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg> Account</a>
          <a href="point.html" class="nav-item ${currentPage==='point'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> Your Points</a>
