<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUSH SHOP — Account</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .account-header {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .avatar-large {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: #fff;
    flex-shrink: 0;
    position: relative;
  }
  .avatar-large input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .account-info h1 {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .account-info .email {
    color: var(--muted);
    font-size: 14px;
  }
  .account-info .role-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(124,92,252,0.12);
    border: 1px solid rgba(124,92,252,0.25);
    color: var(--accent2);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .account-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 640px) {
    .account-grid { grid-template-columns: 1fr; }
  }
  .account-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px;
  }
  .account-card-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .account-card-title svg { color: var(--accent); }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .form-group input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .form-group input::placeholder { color: var(--muted); }
  .form-group input:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .stat-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card-mini {
    background: var(--surface2);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .stat-card-mini .val {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat-card-mini .label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  .btn-save {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    padding: 13px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-save:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(124,92,252,0.4);
  }
  .btn-save:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
  .danger-zone {
    border-color: rgba(244,63,94,0.3);
  }
  .danger-zone .account-card-title { color: var(--error); }
  .btn-delete {
    width: 100%;
    background: transparent;
    border: 1px solid rgba(244,63,94,0.3);
    border-radius: 10px;
    padding: 12px;
    color: var(--error);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-delete:hover {
    background: rgba(244,63,94,0.1);
  }
  .alert-box {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .alert-box.error {
    background: rgba(244,63,94,0.1);
    border: 1px solid rgba(244,63,94,0.3);
    color: var(--error);
  }
  .alert-box.success {
    background: rgba(34,211,165,0.1);
    border: 1px solid rgba(34,211,165,0.3);
    color: var(--success);
  }
  .alert-box.show { display: block; }
  .joined-date {
    font-size: 12px;
    color: var(--muted);
    margin-top: 12px;
  }
  .edit-toggle {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .edit-toggle:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="main-content">
  <div class="page-container">
    <div class="account-header">
      <div class="avatar-large" id="avatarLarge">
        U
        <input type="file" accept="image/*" onchange="changeAvatar(event)">
      </div>
      <div class="account-info">
        <h1 id="displayName">User</h1>
        <div class="email" id="userEmail">user@example.com</div>
        <div class="role-badge" id="roleBadge">
          <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          <span id="roleText">Buyer</span>
        </div>
      </div>
    </div>

    <div class="account-grid">
      <!-- Profile Card -->
      <div class="account-card">
        <div class="account-card-title">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          Profile Information
        </div>
        <div class="alert-box" id="profileAlert"></div>
        <div class="form-group">
          <label>Display Name</label>
          <input type="text" id="nameInput" placeholder="Your display name" disabled>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="emailInput" placeholder="your@email.com" disabled>
        </div>
        <div class="form-group">
          <label>UID</label>
          <input type="text" id="uidInput" placeholder="—" disabled>
        </div>
        <button class="edit-toggle" onclick="toggleEdit()" id="editToggleBtn">Enable Edit</button>
        <button class="btn-save" id="saveProfileBtn" onclick="saveProfile()" disabled style="margin-top:12px">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
          Save Changes
        </button>
      </div>

      <!-- Stats Card -->
      <div class="account-card">
        <div class="account-card-title">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          Activity Stats
        </div>
        <div class="stat-cards">
          <div class="stat-card-mini">
            <div class="val" id="statOrders">0</div>
            <div class="label">Orders</div>
          </div>
          <div class="stat-card-mini">
            <div class="val" id="statPoints">0</div>
            <div class="label">Total Points</div>
          </div>
          <div class="stat-card-mini">
            <div class="val" id="statSpent">0</div>
            <div class="label">Points Spent</div>
          </div>
          <div class="stat-card-mini">
            <div class="val" id="statPurchased">0</div>
            <div class="label">Purchased</div>
          </div>
        </div>
        <div class="joined-date">
          <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          Joined: <span id="joinedDate">—</span>
        </div>
      </div>

      <!-- Security Card -->
      <div class="account-card">
        <div class="account-card-title">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          Security
        </div>
        <div class="alert-box" id="securityAlert"></div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="newPwInput" placeholder="Leave blank to keep current" disabled>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPwInput" placeholder="Repeat new password" disabled>
        </div>
        <button class="edit-toggle" onclick="toggleSecurityEdit()" id="securityEditBtn">Enable Edit</button>
        <button class="btn-save" id="saveSecurityBtn" onclick="saveSecurity()" disabled style="margin-top:12px">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          Update Password
        </button>
      </div>

      <!-- Danger Zone -->
      <div class="account-card danger-zone">
        <div class="account-card-title">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
          Danger Zone
        </div>
        <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Once you delete your account, there is no going back. All your data will be permanently removed.</p>
        <button class="btn-delete" onclick="deleteAccount()">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          Delete My Account
        </button>
      </div>
    </div>
  </div>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, updatePassword, deleteUser, reauthenticateWithCredential, EmailAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
  apiKey: "AIzaSyAa4s7Tn4RNk8TcBE60H54Iy9sKX4bp8L8",
  authDomain: "ok123-716e3.firebaseapp.com",
  projectId: "ok123-716e3",
  storageBucket: "ok123-716e3.firebasestorage.app",
  messagingSenderId: "395598144464",
  appId: "1:395598144464:web:3c0439d9ac9c9688654fd5",
  measurementId: "G-5LCN0JXS9P"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const theme = localStorage.getItem('theme') || 'dark';
  if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');

  let currentUser = null;
  let currentUserData = {};
  let profileEditEnabled = false;
  let securityEditEnabled = false;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    currentUser = user;

    const snap = await get(ref(db, 'users/' + user.uid));
    currentUserData = snap.val() || {};
    const isAdmin = currentUserData.role === 'admin';

    // Render UI
    renderTopbar('Account', currentUserData, isAdmin);
    renderSidebar('account', currentUserData, isAdmin);

    // Fill data
    const initial = (currentUserData.displayName || user.email || 'U')[0].toUpperCase();
    document.getElementById('avatarLarge').innerHTML = initial + '<input type="file" accept="image/*" onchange="changeAvatar(event)">';
    document.getElementById('displayName').textContent = currentUserData.displayName || 'User';
    document.getElementById('userEmail').textContent = user.email;
    document.getElementById('emailInput').value = user.email;
    document.getElementById('uidInput').value = user.uid;
    document.getElementById('nameInput').value = currentUserData.displayName || '';
    document.getElementById('roleText').textContent = isAdmin ? 'Admin' : 'Buyer';

    // Stats
    loadStats(user.uid);

    // Joined date
    if (currentUserData.createdAt) {
      const d = new Date(currentUserData.createdAt);
      document.getElementById('joinedDate').textContent = d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    // Real-time points
    onValue(ref(db, 'users/' + user.uid + '/points'), (s) => {
      currentUserData.points = s.val() || 0;
      document.getElementById('statPoints').textContent = currentUserData.points;
    });
  });

  async function loadStats(uid) {
    // Orders
    const ordersSnap = await get(ref(db, 'orders'));
    const orders = ordersSnap.val() || {};
    const userOrders = Object.values(orders).filter(o => o.userId === uid);
    const completed = userOrders.filter(o => o.status === 'completed').length;
    const purchased = userOrders.length;
    let spent = 0;
    userOrders.forEach(o => { spent += o.pointsSpent || 0; });

    document.getElementById('statOrders').textContent = userOrders.length;
    document.getElementById('statSpent').textContent = spent;
    document.getElementById('statPurchased').textContent = purchased;

    // Watch orders realtime
    onValue(ref(db, 'orders'), (s) => {
      const all = s.val() || {};
      const my = Object.values(all).filter(o => o.userId === uid);
      const done = my.filter(o => o.status === 'completed').length;
      let totalSpent = 0;
      my.forEach(o => { totalSpent += o.pointsSpent || 0; });
      document.getElementById('statOrders').textContent = my.length;
      document.getElementById('statSpent').textContent = totalSpent;
      document.getElementById('statPurchased').textContent = done;
    });
  }

  window.toggleEdit = () => {
    profileEditEnabled = !profileEditEnabled;
    const nameInput = document.getElementById('nameInput');
    const saveBtn = document.getElementById('saveProfileBtn');
    const toggleBtn = document.getElementById('editToggleBtn');
    nameInput.disabled = !profileEditEnabled;
    saveBtn.disabled = !profileEditEnabled;
    toggleBtn.textContent = profileEditEnabled ? 'Disable Edit' : 'Enable Edit';
    if (profileEditEnabled) nameInput.focus();
  };

  window.toggleSecurityEdit = () => {
    securityEditEnabled = !securityEditEnabled;
    const pw1 = document.getElementById('newPwInput');
    const pw2 = document.getElementById('confirmPwInput');
    const saveBtn = document.getElementById('saveSecurityBtn');
    const toggleBtn = document.getElementById('securityEditBtn');
    pw1.disabled = !securityEditEnabled;
    pw2.disabled = !securityEditEnabled;
    saveBtn.disabled = !securityEditEnabled;
    toggleBtn.textContent = securityEditEnabled ? 'Disable Edit' : 'Enable Edit';
    if (securityEditEnabled) pw1.focus();
  };

  window.saveProfile = async () => {
    const newName = document.getElementById('nameInput').value.trim();
    const alertEl = document.getElementById('profileAlert');
    if (!newName) {
      showAlert(alertEl, 'Display name cannot be empty.', 'error');
      return;
    }
    try {
      await update(ref(db, 'users/' + currentUser.uid), { displayName: newName });
      document.getElementById('displayName').textContent = newName;
      currentUserData.displayName = newName;
      const initial = newName[0].toUpperCase();
      document.getElementById('avatarLarge').childNodes[0].textContent = initial;
      showAlert(alertEl, 'Profile updated successfully!', 'success');
      profileEditEnabled = false;
      document.getElementById('nameInput').disabled = true;
      document.getElementById('saveProfileBtn').disabled = true;
      document.getElementById('editToggleBtn').textContent = 'Enable Edit';
    } catch (e) {
      showAlert(alertEl, 'Failed to update: ' + e.message, 'error');
    }
  };

  window.saveSecurity = async () => {
    const newPw = document.getElementById('newPwInput').value;
    const confirmPw = document.getElementById('confirmPwInput').value;
    const alertEl = document.getElementById('securityAlert');
    if (newPw && newPw.length < 8) {
      showAlert(alertEl, 'Password must be at least 8 characters.', 'error');
      return;
    }
    if (newPw && newPw !== confirmPw) {
      showAlert(alertEl, 'Passwords do not match.', 'error');
      return;
    }
    if (!newPw) {
      showAlert(alertEl, 'Please enter a new password.', 'error');
      return;
    }
    try {
      await updatePassword(currentUser, newPw);
      showAlert(alertEl, 'Password updated successfully!', 'success');
      document.getElementById('newPwInput').value = '';
      document.getElementById('confirmPwInput').value = '';
      securityEditEnabled = false;
      document.getElementById('newPwInput').disabled = true;
      document.getElementById('confirmPwInput').disabled = true;
      document.getElementById('saveSecurityBtn').disabled = true;
      document.getElementById('securityEditBtn').textContent = 'Enable Edit';
    } catch (e) {
      if (e.code === 'auth/requires-recent-login') {
        showAlert(alertEl, 'Please re-login and try again.', 'error');
      } else {
        showAlert(alertEl, 'Failed: ' + e.message, 'error');
      }
    }
  };

  window.changeAvatar = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        await update(ref(db, 'users/' + currentUser.uid), { photoBase64: ev.target.result });
        document.getElementById('avatarLarge').childNodes[0].textContent = '';
        const img = document.createElement('img');
        img.src = ev.target.result;
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%';
        document.getElementById('avatarLarge').prepend(img);
        showToast('Avatar Updated', 'Your profile photo has been changed.', 'success');
      } catch (err) {
        showToast('Error', err.message, 'error');
      }
    };
    reader.readAsDataURL(file);
  };

  window.deleteAccount = async () => {
    if (!confirm('Are you absolutely sure? This will permanently delete your account and all data.')) return;
    if (!confirm('FINAL WARNING: All your orders, points, and data will be lost. Continue?')) return;
    try {
      // Delete from DB
      await set(ref(db, 'users/' + currentUser.uid), null);
      await set(ref(db, 'notifications/' + currentUser.uid), null);
      // Delete auth user
      await deleteUser(currentUser);
      showToast('Account Deleted', 'Your account has been permanently removed.', 'success');
      setTimeout(() => { window.location.href = 'login.html'; }, 2000);
    } catch (e) {
      showToast('Error', e.message, 'error');
    }
  };

  function showAlert(el, msg, type) {
    el.textContent = msg;
    el.className = `alert-box ${type} show`;
    setTimeout(() => { el.classList.remove('show'); }, 5000);
  }

  function renderTopbar(title, userData, isAdmin) {
    const initial = (userData.displayName || userData.email || 'U')[0].toUpperCase();
    const notifHTML = `
      <button class="notif-btn" onclick="toggleNotif()" aria-label="Notifications">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
      </button>
    `;
    document.body.insertAdjacentHTML('afterbegin', `
      <div class="topbar">
        <button class="hamburger" onclick="toggleSidebar()"><svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <span class="logo-inline">${title}</span>
        <div class="topbar-right">
          ${notifHTML}
          <div class="avatar-btn" onclick="window.location.href='account.html'">${initial}</div>
        </div>
      </div>
      <div class="toast-container" id="toastContainer"></div>
    `);
  }

  function renderSidebar(currentPage, userData, isAdmin) {
    const adminItems = isAdmin ? `
      <div class="nav-section">Admin</div>

    window.toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('show'); };
  window.closeSidebar = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); };
  window.toggleTheme = () => { const c = document.documentElement.getAttribute('data-theme'); const n = c==='light'?'dark':'light'; document.documentElement.setAttribute('data-theme',n); localStorage.setItem('theme',n); };
  window.toggleNotif = () => { document.getElementById('notifPanel').classList.toggle('open'); };
  window.doLogout = async () => { await signOut(auth); window.location.href = 'login.html'; };

  function showToast(title, msg, type) {
    const id = 'toast_' + Date.now();
    const el = document.createElement('div');
    el.className = `toast ${type}`; el.id = id;
    el.innerHTML = `<div><div class="toast-title">${title}</div><div class="toast-msg">${msg}</div></div><button class="toast-close" onclick="document.getElementById('${id}').remove()">×</button>`;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => { const t = document.getElementById(id); if(t) t.remove(); }, 5000);
  }
  window.showToast = showToast;
</script>
