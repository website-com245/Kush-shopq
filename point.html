<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUSH SHOP — My Points</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .page-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 6px; }
  .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .points-overview {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  @media (max-width: 640px) { .points-overview { grid-template-columns: 1fr; } }
  .point-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .point-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,92,252,0.1), transparent 70%);
  }
  .point-card.balance {
    background: linear-gradient(135deg, rgba(124,92,252,0.15), rgba(192,132,252,0.1));
    border-color: rgba(124,92,252,0.25);
  }
  .point-card.balance .pc-icon {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }
  .point-card.spent .pc-icon { background: rgba(244,63,94,0.15); }
  .point-card.earned .pc-icon { background: rgba(34,211,165,0.15); }
  .pc-icon {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
  }
  .pc-val {
    font-family: 'Syne', sans-serif;
    font-size: 32px; font-weight: 800;
    line-height: 1;
  }
  .point-card.balance .pc-val {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .point-card.spent .pc-val { color: var(--error); }
  .point-card.earned .pc-val { color: var(--success); }
  .pc-label { font-size: 12px; color: var(--muted); margin-top: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
  .history-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    margin-bottom: 32px;
  }
  .history-item {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
  }
  .history-item:last-child { border-bottom: none; }
  .history-item:hover { background: var(--surface2); }
  .history-icon {
    width: 42px; height: 42px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .history-icon.earned { background: rgba(34,211,165,0.12); color: var(--success); }
  .history-icon.spent { background: rgba(244,63,94,0.12); color: var(--error); }
  .history-icon.purchased { background: rgba(124,92,252,0.12); color: var(--accent2); }
  .history-info { flex: 1; }
  .history-title { font-weight: 600; font-size: 14px; }
  .history-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .history-pts {
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 800;
    text-align: right;
  }
  .history-pts.positive { color: var(--success); }
  .history-pts.negative { color: var(--error); }
  .history-date { font-size: 11px; color: var(--muted); text-align: right; margin-top: 2px; }
  .empty-history {
    text-align: center; padding: 48px 20px;
    color: var(--muted);
  }
  .empty-history svg { margin-bottom: 12px; opacity: 0.4; }
  .top-up-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .top-up-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(124,92,252,0.4);
  }
  .filter-tabs {
    display: flex; gap: 8px;
  }
  .filter-tab {
    padding: 6px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-tab:hover { border-color: var(--accent); color: var(--text); }
  .filter-tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent;
    color: #fff;
  }
</style>
</head>
<body>
<div class="main-content">
  <div class="page-container">
    <div class="points-overview">
      <div class="point-card balance">
        <div class="pc-icon">
          <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        </div>
        <div class="pc-val" id="currentBalance">0</div>
        <div class="pc-label">Current Balance</div>
      </div>
      <div class="point-card earned">
        <div class="pc-icon">
          <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="var(--success)" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
        </div>
        <div class="pc-val" id="totalEarned">0</div>
        <div class="pc-label">Total Earned</div>
      </div>
      <div class="point-card spent">
        <div class="pc-icon">
          <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="var(--error)" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </div>
        <div class="pc-val" id="totalSpent">0</div>
        <div class="pc-label">Total Spent</div>
      </div>
    </div>

    <div class="section-header">
      <h2 class="section-title">Point History</h2>
      <div style="display:flex;gap:10px;align-items:center">
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setHistoryFilter('all',this)">All</button>
          <button class="filter-tab" onclick="setHistoryFilter('earned',this)">Earned</button>
          <button class="filter-tab" onclick="setHistoryFilter('spent',this)">Spent</button>
        </div>
        <a href="buy-point.html" class="top-up-btn">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          Top Up
        </a>
      </div>
    </div>

    <div class="history-list" id="historyList">
      <div class="empty-history">
        <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <p>No point history yet</p>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
  apiKey: "AIzaSyAa4s7Tn4RNk8TcBE60H54Iy9sKX4bp8L8",
  authDomain: "ok123-716e3.firebaseapp.com",
  projectId: "ok123-716e3",
  storageBucket: "ok123-716e3.firebasestorage.app",
  messagingSenderId: "395598144464",
  appId: "1:395598144464:web:3c0439d9ac9c9688654fd5",
  measurementId: "G-5LCN0JXS9P"
};
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const theme = localStorage.getItem('theme') || 'dark';
  if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');

  let currentUser = null;
  let allHistory = [];

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    currentUser = user;

    const snap = await get(ref(db, 'users/' + user.uid));
    const userData = snap.val() || {};
    const isAdmin = userData.role === 'admin';

    renderTopbar('My Points', userData, isAdmin);
    renderSidebar('point', userData, isAdmin);

    // Real-time points
    onValue(ref(db, 'users/' + user.uid + '/points'), (s) => {
      const pts = s.val() || 0;
      document.getElementById('currentBalance').textContent = pts.toLocaleString();
    });

    // Load history
    loadPointHistory(user.uid);
  });

  async function loadPointHistory(uid) {
    // Load purchases
    const ordersSnap = await get(ref(db, 'orders'));
    const requestsSnap = await get(ref(db, 'pointRequests'));

    const history = [];

    // Orders (spent)
    const orders = ordersSnap.val() || {};
    Object.values(orders).filter(o => o.userId === uid).forEach(o => {
      history.push({
        type: 'spent',
        title: `Purchased: ${o.gameName || 'Game'}`,
        desc: `Order #${o.createdAt}`,
        points: o.pointsSpent || 0,
        timestamp: o.createdAt || Date.now()
      });
    });

    // Point requests (earned)
    const requests = requestsSnap.val() || {};
    Object.values(requests).filter(r => r.userId === uid && r.status === 'completed').forEach(r => {
      history.push({
        type: 'earned',
        title: `Points Purchase (${r.status})`,
        desc: `${r.points} points via ${r.paymentMethod || 'GCash'}`,
        points: r.points || 0,
        timestamp: r.createdAt || Date.now()
      });
    });

    // Sort by timestamp desc
    history.sort((a, b) => b.timestamp - a.timestamp);

    allHistory = history;
    renderHistory(history);

    // Stats
    const spent = history.filter(h => h.type === 'spent').reduce((sum, h) => sum + h.points, 0);
    const earned = history.filter(h => h.type === 'earned').reduce((sum, h) => sum + h.points, 0);
    document.getElementById('totalSpent').textContent = spent.toLocaleString();
    document.getElementById('totalEarned').textContent = earned.toLocaleString();
  }

  function renderHistory(items) {
    const container = document.getElementById('historyList');
    if (!items.length) {
      container.innerHTML = `
        <div class="empty-history">
          <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <p>No point history yet</p>
        </div>`;
      return;
    }

    container.innerHTML = items.map(item => {
      const iconClass = item.type === 'earned' ? 'earned' : item.type === 'spent' ? 'spent' : 'purchased';
      const icon = item.type === 'earned'
        ? '<svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>'
        : '<svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>';
      const sign = item.type === 'earned' ? '+' : '-';
      const cls = item.type === 'earned' ? 'positive' : 'negative';
      const date = new Date(item.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

      return `
        <div class="history-item">
          <div class="history-icon ${iconClass}">${icon}</div>
          <div class="history-info">
            <div class="history-title">${item.title}</div>
            <div class="history-desc">${item.desc}</div>
          </div>
          <div>
            <div class="history-pts ${cls}">${sign}${item.points}</div>
            <div class="history-date">${date}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  window.setHistoryFilter = (filter, el) => {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    const filtered = filter === 'all' ? allHistory : allHistory.filter(h => h.type === filter);
    renderHistory(filtered);
  };

  function renderTopbar(title, userData, isAdmin) {
    const initial = (userData.displayName || userData.email || 'U')[0].toUpperCase();
    document.body.insertAdjacentHTML('afterbegin', `
      <div class="topbar">
        <button class="hamburger" onclick="toggleSidebar()"><svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <span class="logo-inline">${title}</span>
        <div class="topbar-right">
          <div class="avatar-btn" onclick="window.location.href='account.html'">${initial}</div>
        </div>
      </div>
      <div class="toast-container" id="toastContainer"></div>
    `);
  }

  function renderSidebar(currentPage, userData, isAdmin) {
    const adminItems = isAdmin ? `
      <div class="nav-section">Admin</div>
      <a href="admin-dashboard.html" class="nav-item ${currentPage==='admin-dashboard'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Admin Dashboard <span class="admin-badge">Admin</span></a>
      <a href="upload.html" class="nav-item ${currentPage==='upload'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg> Upload Game</a>
    ` : '';
    document.body.insertAdjacentHTML('afterbegin', `
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="sidebar-logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="sidebar-logo-text">KUSH SHOP</span></div>
        <div class="sidebar-user"><div class="sidebar-user-name">${userData.displayName||'User'}</div><div class="sidebar-user-email">${userData.email||''}</div><div class="sidebar-points"><svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${userData.points||0} pts</div></div>
        <nav class="sidebar-nav">
          <div class="nav-section">Main</div>
          <a href="home.html" class="nav-item ${currentPage==='home'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg> Home</a>
          <a href="shop.html" class="nav-item ${currentPage==='shop'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg> Products</a>
          <div class="nav-section">Account</div>
          <a href="account.html" class="nav-item ${currentPage==='account'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg> Account</a>
                 <a href="point.html" class="nav-item ${currentPage==='point'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> Your Points</a>
          <a href="buy-point.html" class="nav-item ${currentPage==='buy-point'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg> Buy Points</a>
          <a href="done-buy.html" class="nav-item ${currentPage==='done-buy'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> Done Buy</a>
          <div class="nav-section">Preferences</div>
          <a href="setting.html" class="nav-item ${currentPage==='setting'?'active':''}"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg> Settings</a>
          <div class="theme-toggle" onclick="toggleTheme()"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg> Theme <div class="toggle-switch"></div></div>
          ${adminItems}
        </nav>
        <div class="sidebar-footer"><button class="logout-btn" onclick="doLogout()"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg> Sign Out</button></div>
      </div>
      <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    `);
  }

  window.toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('show'); };
  window.closeSidebar = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); };
  window.toggleTheme = () => { const c = document.documentElement.getAttribute('data-theme'); const n = c==='light'?'dark':'light'; document.documentElement.setAttribute('data-theme',n); localStorage.setItem('theme',n); };
  window.doLogout = async () => { await signOut(auth); window.location.href = 'login.html'; };
</script>
</body>
</html>
