<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusStore — Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .shop-header {
    margin-bottom: 28px;
  }
  .shop-header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px; font-weight: 800;
    margin-bottom: 6px;
  }
  .shop-header p { color: var(--muted); font-size: 14px; }

  .search-filter-row {
    display: flex; gap: 12px; align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .search-box {
    position: relative; flex: 1; min-width: 200px;
  }
  .search-box svg {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }
  .search-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px 12px 44px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--muted); }

  .category-tabs {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .cat-tab {
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .cat-tab:hover { border-color: var(--accent); color: var(--text); }
  .cat-tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent;
    color: #fff;
  }

  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }
  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.2s;
    position: relative;
  }
  .game-card:hover {
    border-color: rgba(124,92,252,0.4);
    transform: translateY(-4px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.3);
  }
  .game-thumb {
    width: 100%; aspect-ratio: 16/9;
    background: linear-gradient(135deg, var(--surface2), var(--surface3));
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    overflow: hidden;
    position: relative;
  }
  .game-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .out-of-stock-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.65);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
  }
  .oos-badge {
    background: var(--error);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 6px;
  }
  .game-cat-badge {
    position: absolute; top: 10px; left: 10px;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    color: #fff;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .game-card-body { padding: 16px; }
  .game-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    margin-bottom: 6px;
  }
  .game-desc {
    font-size: 12px; color: var(--muted);
    line-height: 1.5;
    margin-bottom: 14px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .game-footer {
    display: flex; align-items: center; justify-content: space-between;
  }
  .game-price {
    font-family: 'Syne', sans-serif;
    font-size: 18px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .game-price-label { font-size: 11px; color: var(--muted); }
  .buy-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .buy-btn:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(124,92,252,0.4); }
  .buy-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Buy Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 500;
    display: none; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    max-width: 420px; width: 90%;
    animation: modalIn 0.3s ease;
  }
  @keyframes modalIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 700;
    margin-bottom: 16px;
  }
  .modal-game-info {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface2);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 20px;
  }
  .modal-game-thumb {
    width: 60px; height: 60px;
    border-radius: 10px;
    background: var(--surface3);
    overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
  }
  .modal-game-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .modal-game-name { font-weight: 700; font-size: 15px; }
  .modal-game-price { color: var(--accent2); font-size: 13px; font-weight: 600; margin-top: 4px; }
  .points-status {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface2);
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 14px;
  }
  .points-status .my-pts { color: var(--accent2); font-weight: 700; }
  .modal-actions { display: flex; gap: 10px; }
  .modal-actions button { flex: 1; }
  .results-count {
    font-size: 13px; color: var(--muted);
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="main-content">
  <div class="page-container">
    <div class="shop-header">
      <h1> KUSH SHOP </h1>
      <p>premium cheat and injector</p>
    </div>

    <div class="search-filter-row">
      <div class="search-box">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search games..." oninput="filterGames()">
      </div>
      <div class="category-tabs">
        <button class="cat-tab active" onclick="setCategory('all',this)">All Games</button>
        <button class="cat-tab" onclick="setCategory('iOS',this)">iOS</button>
        <button class="cat-tab" onclick="setCategory('Mobile',this)">Mobile</button>
      </div>
    </div>

    <div class="results-count" id="resultsCount"></div>
    <div class="games-grid" id="gamesGrid">
      <div style="color:var(--muted);font-size:14px;padding:40px;grid-column:1/-1;text-align:center">Loading games...</div>
    </div>
  </div>
</div>

<!-- Buy Modal -->
<div class="modal-overlay" id="buyModal">
  <div class="modal">
    <h2>Purchase Game</h2>
    <div class="modal-game-info">
      <div class="modal-game-thumb" id="modalThumb">
        <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2"/></svg>
      </div>
      <div>
        <div class="modal-game-name" id="modalName"></div>
        <div class="modal-game-price" id="modalPrice"></div>
      </div>
    </div>
    <div class="points-status">
      <span>Your Points</span>
      <span class="my-pts" id="modalMyPoints">0 pts</span>
    </div>
    <div id="modalAlert" style="display:none;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.3);color:var(--error)"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-accent" id="confirmBuyBtn" onclick="confirmPurchase()">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        Confirm Purchase
      </button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, onValue, get, set, push, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAa4s7Tn4RNk8TcBE60H54Iy9sKX4bp8L8",
  authDomain: "ok123-716e3.firebaseapp.com",
  projectId: "ok123-716e3",
  storageBucket: "ok123-716e3.firebasestorage.app",
  messagingSenderId: "395598144464",
  appId: "1:395598144464:web:3c0439d9ac9c9688654fd5",
  measurementId: "G-5LCN0JXS9P"
};
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const theme = localStorage.getItem('theme') || 'dark';
  if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');

  let allGames = {};
  let currentCategory = 'all';
  let currentUser = null;
  let currentUserData = {};
  let selectedGame = null;
  let selectedGameId = null;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    currentUser = user;

    const snap = await get(ref(db, 'users/' + user.uid));
    currentUserData = snap.val() || {};
    const isAdmin = currentUserData.role === 'admin';

    injectSidebar(currentUserData, isAdmin);

    // Watch user points
    onValue(ref(db, 'users/' + user.uid + '/points'), (s) => {
      currentUserData.points = s.val() || 0;
    });

    // Load games realtime
    onValue(ref(db, 'games'), (s) => {
      allGames = s.val() || {};
      renderGames();
    });
  });

  function renderGames() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const entries = Object.entries(allGames).filter(([, g]) => {
    const matchCat = currentCategory === 'all' || g.category === currentCategory;
    const matchQ = !q || g.name.toLowerCase().includes(q) || (g.description || '').toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  
  document.getElementById('resultsCount').textContent = `${entries.length} game${entries.length !== 1 ? 's' : ''} found`;
  const grid = document.getElementById('gamesGrid');
  
  if (!entries.length) {
    grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon"><svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2"/></svg></div>
          <h3>No games found</h3>
          <p>Try a different search or category</p>
        </div>`;
    return;
  }
  
  grid.innerHTML = entries.map(([id, g]) => {
    // ✅ FIXED: Check stock based on buyLimit - sold
    const remainingStock = (g.buyLimit || 0) - (g.sold || 0);
    const isOOS = remainingStock <= 0;
    
    return `
        <div class="game-card">
          <div class="game-thumb">
            ${g.imageBase64 ? `<img src="${g.imageBase64}" alt="${g.name}">` : `<svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2"/></svg>`}
            <span class="game-cat-badge">${g.category || 'Mobile'}</span>
            ${isOOS ? `<div class="out-of-stock-overlay"><span class="oos-badge">Out of Stock</span></div>` : ''}
          </div>
          <div class="game-card-body">
            <div class="game-name">${g.name}</div>
            <div class="game-desc">${g.description || 'No description available.'}</div>
            <div class="game-footer">
              <div>
                <div class="game-price">${g.pointsPrice}</div>
                <div class="game-price-label">${remainingStock} left</div>
              </div>
              <button class="buy-btn" ${isOOS ? 'disabled' : ''} onclick="openBuyModal('${id}')">
                ${isOOS ? 'Out of Stock' : 'Buy Now'}
              </button>
            </div>
          </div>
        </div>
      `;
  }).join('');
}
  window.filterGames = renderGames;
  window.setCategory = (cat, el) => {
    currentCategory = cat;
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderGames();
  };

  window.openBuyModal = (gameId) => {
    selectedGameId = gameId;
    selectedGame = allGames[gameId];
    document.getElementById('modalName').textContent = selectedGame.name;
    document.getElementById('modalPrice').textContent = selectedGame.pointsPrice + ' points';
    const thumb = document.getElementById('modalThumb');
    thumb.innerHTML = selectedGame.imageBase64
      ? `<img src="${selectedGame.imageBase64}" style="width:100%;height:100%;object-fit:cover">`
      : `<svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2"/></svg>`;
    document.getElementById('modalMyPoints').textContent = (currentUserData.points || 0) + ' pts';
    document.getElementById('modalAlert').style.display = 'none';
    document.getElementById('buyModal').classList.add('open');
  };

  window.closeModal = () => { document.getElementById('buyModal').classList.remove('open'); };

  window.confirmPurchase = async () => {
    const myPts = currentUserData.points || 0;
    const cost = selectedGame.pointsPrice;
    const alertEl = document.getElementById('modalAlert');
    if (myPts < cost) {
        alertEl.textContent = `Insufficient points. You need ${cost - myPts} more points.`;
        alertEl.style.display = 'block';
        return;
    }
    const btn = document.getElementById('confirmBuyBtn');
    btn.disabled = true; btn.textContent = 'Processing...';

    try {
        // Deduct points
        await update(ref(db, 'users/' + currentUser.uid), { points: myPts - cost });
        
        // Update sold count
        const currentSold = selectedGame.sold || 0;
        await update(ref(db, 'games/' + selectedGameId), { sold: currentSold + 1 });
        
        // Create order with hostingLink
        const orderRef = push(ref(db, 'orders'));
        await set(orderRef, {
            userId: currentUser.uid,
            gameId: selectedGameId,
            gameName: selectedGame.name,
            gameKey: selectedGame.keys && selectedGame.keys[0] ? selectedGame.keys[0] : '',
            gameImage: selectedGame.imageBase64 || '',
            hostingLink: selectedGame.hostingLink || '',  // ✅ ADD THIS
            pointsSpent: cost,
            status: 'pending',
            createdAt: Date.now()
        });
        
        // Notify user
        await push(ref(db, 'notifications/' + currentUser.uid), {
            title: 'Purchase Pending',
            message: `Your order for "${selectedGame.name}" is under review.`,
            timestamp: Date.now(),
            read: false
        });
        
        closeModal();
        showToast('Order Placed!', 'Your purchase is pending admin approval.', 'success');
    } catch (e) {
        alertEl.textContent = 'Purchase failed: ' + e.message;
        alertEl.style.display = 'block';
    }
    btn.disabled = false;
    btn.innerHTML = '<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg> Confirm Purchase';
};
  function showToast(title, msg, type) {
    const id = 'toast_' + Date.now();
    const el = document.createElement('div');
    el.className = `toast ${type}`; el.id = id;
    el.innerHTML = `<div><div class="toast-title">${title}</div><div class="toast-msg">${msg}</div></div><button class="toast-close" onclick="document.getElementById('${id}').remove()">×</button>`;
    const container = document.getElementById('toastContainer');
    if (container) container.appendChild(el);
    setTimeout(() => { const t = document.getElementById(id); if(t) t.remove(); }, 5000);
  }

  function injectSidebar(userData, isAdmin) {
    const adminItems = isAdmin ? `
      <div class="nav-section">Admin</div>
      <a href="admin-dashboard.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Admin Dashboard <span class="admin-badge">Admin</span></a>
      <a href="upload.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg> Upload Game</a>
    ` : '';
    const initial = (userData.displayName || userData.email || 'U')[0].toUpperCase();
    document.body.insertAdjacentHTML('afterbegin', `
      <div class="topbar">
        <button class="hamburger" onclick="toggleSidebar()"><svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <span class="logo-inline">KUSH CHEAT Store</span>
        <div class="topbar-right">
          <div class="avatar-btn" onclick="window.location.href='account.html'">${initial}</div>
        </div>
      </div>
      <div class="toast-container" id="toastContainer"></div>
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="sidebar-logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="sidebar-logo-text">SHAN Store</span></div>
        <div class="sidebar-user">
          <div class="sidebar-user-name">${userData.displayName || 'User'}</div>
          <div class="sidebar-user-email">${userData.email || ''}</div>
          <div class="sidebar-points"><svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${userData.points || 0} pts</div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-section">Main</div>
          <a href="home.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg> Home</a>
          <a href="shop.html" class="nav-item active"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg> Products</a>
          <div class="nav-section">Account</div>
          <a href="account.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg> Account</a>
          <a href="point.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> Your Points</a>
          <a href="buy-point.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg> Buy Points</a>
          <a href="done-buy.html" class="nav-item"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> Done Buy</a>
          <div class="nav-section">Preferences</div>

  window.closeSidebar = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); };
  window.toggleTheme = () => { const c = document.documentElement.getAttribute('data-theme'); const n = c==='light'?'dark':'light'; document.documentElement.setAttribute('data-theme',n); localStorage.setItem('theme',n); };
